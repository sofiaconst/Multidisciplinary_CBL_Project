<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sippy — Logged-in dashboard</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        font-family: 'DM Sans', system-ui, sans-serif;
        background: #f0eee9;
      }
      @keyframes hsPulse {
        0%   { box-shadow: 0 0 0 0 rgba(0,135,189,0.55); }
        70%  { box-shadow: 0 0 0 8px rgba(0,135,189,0); }
        100% { box-shadow: 0 0 0 0 rgba(0,135,189,0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="logged-in-dashboard.jsx"></script>
    <script type="text/babel">
      function App() {
        return (
          <DesignCanvas
            projectTitle="Sippy"
            projectSubtitle="Screen 4 of 5 — Logged-in dashboard · 3 variations"
          >
            <DCSection
              id="logged-desktop"
              title="Logged-in dashboard"
              subtitle="A: single column. B: sidebar + main. C: card grid with teal hero progress. One artboard shows the amber 'time to drink' reminder state."
            >
              <DCArtboard id="d-a" label="A · Single column" width={1280} height={1240}>
                <LoggedA />
              </DCArtboard>
              <DCArtboard id="d-b" label="B · Sidebar + main" width={1280} height={860}>
                <LoggedB />
              </DCArtboard>
              <DCArtboard id="d-b-due" label="B · Sidebar (reminder due)" width={1280} height={860}>
                <LoggedB reminderDue />
              </DCArtboard>
              <DCArtboard id="d-c" label="C · Card grid + teal hero" width={1280} height={1080}>
                <LoggedC />
              </DCArtboard>
            </DCSection>
            <DCSection
              id="logged-mobile"
              title="Logged-in dashboard — Mobile"
              subtitle="Stacked at 390px. Variation B turns the sidebar into a user strip at the top."
            >
              <DCArtboard id="m-a" label="A · Single column (mobile)" width={390} height={1340}>
                <LoggedA mobile />
              </DCArtboard>
              <DCArtboard id="m-b" label="B · Sidebar (mobile)" width={390} height={1340}>
                <LoggedB mobile />
              </DCArtboard>
              <DCArtboard id="m-c" label="C · Card grid (mobile)" width={390} height={1340}>
                <LoggedC mobile />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
