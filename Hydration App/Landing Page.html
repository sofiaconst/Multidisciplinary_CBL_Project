<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hydration Scale — Landing</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        font-family: 'DM Sans', system-ui, sans-serif;
        background: #f0eee9;
      }
      @keyframes hsPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(29, 158, 117, 0.45);
        }
        70% {
          box-shadow: 0 0 0 8px rgba(29, 158, 117, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(29, 158, 117, 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="landing-variations.jsx"></script>
    <script type="text/babel">
      const { useState } = React;

      function App() {
        return (
          <DesignCanvas
            projectTitle="Hydration Scale"
            projectSubtitle="Screen 1 of 5 — Landing page · 3 desktop + 3 mobile variations"
          >
            <DCSection
              id="landing"
              title="Landing / Home"
              subtitle="First page visitors see. Same content, three layout directions."
            >
              <DCArtboard
                id="landing-a"
                label="A · Split hero"
                width={1280}
                height={1100}
              >
                <LandingA />
              </DCArtboard>
              <DCArtboard
                id="landing-b"
                label="B · Centered bold"
                width={1280}
                height={1480}
              >
                <LandingB />
              </DCArtboard>
              <DCArtboard
                id="landing-c"
                label="C · Live demo feel"
                width={1280}
                height={900}
              >
                <LandingC />
              </DCArtboard>
            </DCSection>
            <DCSection
              id="landing-mobile"
              title="Landing / Home — Mobile"
              subtitle="Same three directions, stacked single column at 390px."
            >
              <DCArtboard
                id="mobile-a"
                label="A · Split hero (mobile)"
                width={390}
                height={1280}
              >
                <MobileLandingA />
              </DCArtboard>
              <DCArtboard
                id="mobile-b"
                label="B · Centered bold (mobile)"
                width={390}
                height={1320}
              >
                <MobileLandingB />
              </DCArtboard>
              <DCArtboard
                id="mobile-c"
                label="C · Live demo (mobile)"
                width={390}
                height={920}
              >
                <MobileLandingC />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
