<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hydration Scale — History</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body, #root { height: 100%; margin: 0; font-family: 'DM Sans', system-ui, sans-serif; background: #f0eee9; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="history-page.jsx"></script>
    <script type="text/babel">
      function App() {
        return (
          <DesignCanvas
            projectTitle="Hydration Scale"
            projectSubtitle="History — 2 variations · desktop + mobile"
          >
            <DCSection
              id="history-desktop"
              title="History"
              subtitle="A: time-series dashboard with weekly bar chart and sessions list. B: year heatmap + day timeline detail."
            >
              <DCArtboard id="d-a" label="A · Weekly chart + sessions" width={1280} height={1080}>
                <HistoryA />
              </DCArtboard>
              <DCArtboard id="d-b" label="B · Year heatmap + day detail" width={1280} height={880}>
                <HistoryB />
              </DCArtboard>
            </DCSection>
            <DCSection
              id="history-mobile"
              title="History — Mobile"
              subtitle="Stacked layouts. Bar chart and heatmap compact gracefully at 390px."
            >
              <DCArtboard id="m-a" label="A · Weekly chart (mobile)" width={390} height={1240}>
                <HistoryA mobile />
              </DCArtboard>
              <DCArtboard id="m-b" label="B · Heatmap (mobile)" width={390} height={920}>
                <HistoryB mobile />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
