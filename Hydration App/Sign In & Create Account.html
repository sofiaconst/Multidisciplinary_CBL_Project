<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hydration Scale — Sign in / Create account</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        font-family: 'DM Sans', system-ui, sans-serif;
        background: #f0eee9;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="auth-variations.jsx"></script>
    <script type="text/babel">
      function App() {
        return (
          <DesignCanvas
            projectTitle="Hydration Scale"
            projectSubtitle="Screen 2 of 5 — Sign in / Create account"
          >
            <DCSection
              id="auth-desktop"
              title="Sign in / Create account"
              subtitle="Two layouts × two modes. Layout A: single centered card. Layout B: split-screen with teal hero panel."
            >
              <DCArtboard id="d-a-signin" label="Sign in · A · Centered" width={1280} height={820}>
                <AuthA_SignIn />
              </DCArtboard>
              <DCArtboard id="d-a-create" label="Create · A · Centered" width={1280} height={920}>
                <AuthA_Create />
              </DCArtboard>
              <DCArtboard id="d-b-signin" label="Sign in · B · Split" width={1280} height={760}>
                <AuthB_SignIn />
              </DCArtboard>
              <DCArtboard id="d-b-create" label="Create · B · Split" width={1280} height={860}>
                <AuthB_Create />
              </DCArtboard>
            </DCSection>
            <DCSection
              id="auth-mobile"
              title="Sign in / Create account — Mobile"
              subtitle="Stacked layouts at 390px. Variation B becomes a top teal slab + form below."
            >
              <DCArtboard id="m-a-signin" label="Sign in · A · Centered (mobile)" width={390} height={760}>
                <AuthA_SignIn_M />
              </DCArtboard>
              <DCArtboard id="m-a-create" label="Create · A · Centered (mobile)" width={390} height={880}>
                <AuthA_Create_M />
              </DCArtboard>
              <DCArtboard id="m-b-signin" label="Sign in · B · Split (mobile)" width={390} height={820}>
                <AuthB_SignIn_M />
              </DCArtboard>
              <DCArtboard id="m-b-create" label="Create · B · Split (mobile)" width={390} height={940}>
                <AuthB_Create_M />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
