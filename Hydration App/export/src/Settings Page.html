<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hydration Scale — Settings</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Icons (Mingcute via Iconify) — bundler inlines each as data URL on window.__resources. -->
    <meta name="ext-resource-dependency" data-resource-id="icon__drop-fill__1d9e75"          content="https://api.iconify.design/mingcute/drop-fill.svg?color=%231D9E75" />
    <meta name="ext-resource-dependency" data-resource-id="icon__camera-line__5f5e5a"        content="https://api.iconify.design/mingcute/camera-line.svg?color=%235F5E5A" />
    <meta name="ext-resource-dependency" data-resource-id="icon__subtract-line__5f5e5a"         content="https://api.iconify.design/mingcute/subtract-line.svg?color=%235F5E5A" />
    <meta name="ext-resource-dependency" data-resource-id="icon__add-line__5f5e5a"             content="https://api.iconify.design/mingcute/add-line.svg?color=%235F5E5A" />
    <meta name="ext-resource-dependency" data-resource-id="icon__sparkles-line__1d9e75"      content="https://api.iconify.design/mingcute/sparkles-line.svg?color=%231D9E75" />
    <meta name="ext-resource-dependency" data-resource-id="icon__light-line__2c2c2a"         content="https://api.iconify.design/mingcute/light-line.svg?color=%232C2C2A" />
    <meta name="ext-resource-dependency" data-resource-id="icon__refresh-1-line__2c2c2a"     content="https://api.iconify.design/mingcute/refresh-1-line.svg?color=%232C2C2A" />
    <meta name="ext-resource-dependency" data-resource-id="icon__settings-3-line__ffffff"    content="https://api.iconify.design/mingcute/settings-3-line.svg?color=%23FFFFFF" />
    <meta name="ext-resource-dependency" data-resource-id="icon__right-line__5f5e5a"         content="https://api.iconify.design/mingcute/right-line.svg?color=%235F5E5A" />
    <meta name="ext-resource-dependency" data-resource-id="icon__alert-octagon-line__a32d2d" content="https://api.iconify.design/mingcute/alert-octagon-line.svg?color=%23A32D2D" />
    <meta name="ext-resource-dependency" data-resource-id="icon__delete-2-line__a32d2d"      content="https://api.iconify.design/mingcute/delete-2-line.svg?color=%23A32D2D" />
    <meta name="ext-resource-dependency" data-resource-id="icon__exit-line__2c2c2a"          content="https://api.iconify.design/mingcute/exit-line.svg?color=%232C2C2A" />
    <meta name="ext-resource-dependency" data-resource-id="icon__left-line__2c2c2a"          content="https://api.iconify.design/mingcute/left-line.svg?color=%232C2C2A" />
    <template id="__bundler_thumbnail">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
        <rect width="200" height="200" fill="#E1F5EE" />
        <rect x="40" y="45" width="120" height="110" rx="14" fill="#FFFFFF" stroke="#1D9E75" stroke-width="2" />
        <rect x="56" y="62" width="20" height="4" rx="2" fill="#9FE1CB" />
        <rect x="56" y="74" width="64" height="3" rx="1.5" fill="#D3D1C7" />
        <rect x="56" y="86" width="20" height="4" rx="2" fill="#9FE1CB" />
        <rect x="56" y="98" width="56" height="3" rx="1.5" fill="#D3D1C7" />
        <rect x="56" y="116" width="60" height="14" rx="6" fill="#1D9E75" />
      </svg>
    </template>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        font-family: 'DM Sans', system-ui, sans-serif;
        background: #f0eee9;
      }
      @keyframes hsPulse {
        0%   { box-shadow: 0 0 0 0 rgba(29, 158, 117, 0.45); }
        70%  { box-shadow: 0 0 0 8px rgba(29, 158, 117, 0); }
        100% { box-shadow: 0 0 0 0 rgba(29, 158, 117, 0); }
      }
      @keyframes hsFadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="settings-page.jsx"></script>
    <script type="text/babel">
      function App() {
        return (
          <DesignCanvas
            projectTitle="Hydration Scale"
            projectSubtitle="Screen 5 of 5 — Settings · tabbed + scrollable"
          >
            <DCSection
              id="settings-tabbed"
              title="Variation A · Tabbed"
              subtitle="One section visible at a time. Switch via the tab strip."
            >
              <DCArtboard id="d-a-profile" label="A · Profile tab" width={1280} height={1080}>
                <SettingsA initialTab="Profile" />
              </DCArtboard>
              <DCArtboard id="d-a-goals" label="A · Goals tab (with recommendation)" width={1280} height={720}>
                <SettingsA initialTab="Goals" />
              </DCArtboard>
              <DCArtboard id="d-a-reminders" label="A · Reminders tab" width={1280} height={760}>
                <SettingsA initialTab="Reminders" />
              </DCArtboard>
              <DCArtboard id="d-a-scale" label="A · Scale tab" width={1280} height={720}>
                <SettingsA initialTab="Scale" />
              </DCArtboard>
              <DCArtboard id="d-a-account" label="A · Account tab" width={1280} height={800}>
                <SettingsA initialTab="Account" />
              </DCArtboard>
            </DCSection>
            <DCSection
              id="settings-scrollable"
              title="Variation B · Scrollable"
              subtitle="All sections stacked on one page with a sticky save bar at the bottom."
            >
              <DCArtboard id="d-b" label="B · All sections" width={1280} height={2400}>
                <SettingsB />
              </DCArtboard>
            </DCSection>
            <DCSection
              id="settings-mobile"
              title="Settings — Mobile"
              subtitle="Tabs scroll horizontally on narrow screens. Save bar persists at bottom."
            >
              <DCArtboard id="m-a-profile" label="A · Profile (mobile)" width={390} height={1240}>
                <SettingsA initialTab="Profile" mobile />
              </DCArtboard>
              <DCArtboard id="m-a-goals" label="A · Goals (mobile)" width={390} height={780}>
                <SettingsA initialTab="Goals" mobile />
              </DCArtboard>
              <DCArtboard id="m-a-reminders" label="A · Reminders (mobile)" width={390} height={900}>
                <SettingsA initialTab="Reminders" mobile />
              </DCArtboard>
              <DCArtboard id="m-b" label="B · Scrollable (mobile)" width={390} height={2640}>
                <SettingsB mobile />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
