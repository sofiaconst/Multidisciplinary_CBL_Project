<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hydration Scale — Sign in / Create account</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Icons (Mingcute via Iconify) — bundler inlines each as data URL on window.__resources. -->
    <meta name="ext-resource-dependency" data-resource-id="icon__drop-fill__1d9e75"        content="https://api.iconify.design/mingcute/drop-fill.svg?color=%231D9E75" />
    <meta name="ext-resource-dependency" data-resource-id="icon__drop-fill__ffffff"        content="https://api.iconify.design/mingcute/drop-fill.svg?color=%23FFFFFF" />
    <meta name="ext-resource-dependency" data-resource-id="icon__eye-line__888780"         content="https://api.iconify.design/mingcute/eye-line.svg?color=%23888780" />
    <meta name="ext-resource-dependency" data-resource-id="icon__eye-close-line__888780"   content="https://api.iconify.design/mingcute/eye-close-line.svg?color=%23888780" />
    <meta name="ext-resource-dependency" data-resource-id="icon__check-line__ffffff"       content="https://api.iconify.design/mingcute/check-line.svg?color=%23FFFFFF" />
    <meta name="ext-resource-dependency" data-resource-id="icon__check-line__1d9e75"       content="https://api.iconify.design/mingcute/check-line.svg?color=%231D9E75" />
    <template id="__bundler_thumbnail">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
        <rect width="200" height="200" fill="#E1F5EE" />
        <rect x="55" y="65" width="90" height="70" rx="12" fill="#FFFFFF" stroke="#1D9E75" stroke-width="2" />
        <rect x="68" y="82" width="64" height="6" rx="3" fill="#9FE1CB" />
        <rect x="68" y="98" width="44" height="6" rx="3" fill="#9FE1CB" />
        <rect x="68" y="116" width="64" height="8" rx="3" fill="#1D9E75" />
      </svg>
    </template>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        font-family: 'DM Sans', system-ui, sans-serif;
        background: #f0eee9;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="auth-variations.jsx"></script>
    <script type="text/babel">
      function App() {
        return (
          <DesignCanvas
            projectTitle="Hydration Scale"
            projectSubtitle="Screen 2 of 5 — Sign in / Create account"
          >
            <DCSection
              id="auth-desktop"
              title="Sign in / Create account"
              subtitle="Two layouts × two modes. Layout A: single centered card. Layout B: split-screen with teal hero panel."
            >
              <DCArtboard id="d-a-signin" label="Sign in · A · Centered" width={1280} height={820}>
                <AuthA_SignIn />
              </DCArtboard>
              <DCArtboard id="d-a-create" label="Create · A · Centered" width={1280} height={920}>
                <AuthA_Create />
              </DCArtboard>
              <DCArtboard id="d-b-signin" label="Sign in · B · Split" width={1280} height={760}>
                <AuthB_SignIn />
              </DCArtboard>
              <DCArtboard id="d-b-create" label="Create · B · Split" width={1280} height={860}>
                <AuthB_Create />
              </DCArtboard>
            </DCSection>
            <DCSection
              id="auth-mobile"
              title="Sign in / Create account — Mobile"
              subtitle="Stacked layouts at 390px. Variation B becomes a top teal slab + form below."
            >
              <DCArtboard id="m-a-signin" label="Sign in · A · Centered (mobile)" width={390} height={760}>
                <AuthA_SignIn_M />
              </DCArtboard>
              <DCArtboard id="m-a-create" label="Create · A · Centered (mobile)" width={390} height={880}>
                <AuthA_Create_M />
              </DCArtboard>
              <DCArtboard id="m-b-signin" label="Sign in · B · Split (mobile)" width={390} height={820}>
                <AuthB_SignIn_M />
              </DCArtboard>
              <DCArtboard id="m-b-create" label="Create · B · Split (mobile)" width={390} height={940}>
                <AuthB_Create_M />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
